version: "3.9"

services:
  backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: huoyan_backend
    command: ["python", "main.py"]
    env_file:
      - .env
    ports:
      - "8000:8000"
    volumes:
      - ./data:/app/data
    restart: unless-stopped
    networks:
      - huoyan_net

networks:
  huoyan_net:
    external: true
    name: huoyan_net
